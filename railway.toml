[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20"]

[build.nixpacksPlan.phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@10.34.0 --activate", "pnpm install --no-frozen-lockfile"]

[build.nixpacksPlan.phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
