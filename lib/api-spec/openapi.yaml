openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Parent Kicking Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: athletes
    description: Athlete management
  - name: seasons
    description: Season management
  - name: games
    description: Game management
  - name: practice-sessions
    description: Practice session management
  - name: kicks
    description: Kick tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /athletes:
    get:
      operationId: getAthletes
      tags: [athletes]
      summary: List all athletes
      responses:
        "200":
          description: List of athletes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Athlete"
    post:
      operationId: createAthlete
      tags: [athletes]
      summary: Create a new athlete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAthleteBody"
      responses:
        "201":
          description: Created athlete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Athlete"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /athletes/{id}:
    patch:
      operationId: updateAthlete
      tags: [athletes]
      summary: Rename an athlete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAthleteBody"
      responses:
        "200":
          description: Updated athlete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Athlete"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAthlete
      tags: [athletes]
      summary: Delete an athlete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /seasons:
    get:
      operationId: getSeasons
      tags: [seasons]
      summary: List seasons for an athlete
      parameters:
        - name: athleteId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of seasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"
    post:
      operationId: createSeason
      tags: [seasons]
      summary: Create a new season
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeasonBody"
      responses:
        "201":
          description: Created season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /seasons/{id}:
    patch:
      operationId: updateSeason
      tags: [seasons]
      summary: Update a season name or year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSeasonBody"
      responses:
        "200":
          description: Updated season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSeason
      tags: [seasons]
      summary: Delete a season
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games:
    get:
      operationId: getGames
      tags: [games]
      summary: List games for a season
      parameters:
        - name: seasonId
          in: query
          required: false
          schema:
            type: string
        - name: athleteId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
    post:
      operationId: createGame
      tags: [games]
      summary: Create a new game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameBody"
      responses:
        "201":
          description: Created game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /games/{id}:
    patch:
      operationId: updateGame
      tags: [games]
      summary: Update a game (final score, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGameBody"
      responses:
        "200":
          description: Updated game
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteGame
      tags: [games]
      summary: Delete a game
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /practice-sessions:
    get:
      operationId: getPracticeSessions
      tags: [practice-sessions]
      summary: List practice sessions for an athlete
      parameters:
        - name: athleteId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of practice sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PracticeSession"
    post:
      operationId: createPracticeSession
      tags: [practice-sessions]
      summary: Create a new practice session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePracticeSessionBody"
      responses:
        "201":
          description: Created practice session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeSession"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /practice-sessions/{id}:
    patch:
      operationId: updatePracticeSession
      tags: [practice-sessions]
      summary: Update a practice session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePracticeSessionBody"
      responses:
        "200":
          description: Updated practice session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PracticeSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePracticeSession
      tags: [practice-sessions]
      summary: Delete a practice session (and dissociate its kicks)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kicks:
    get:
      operationId: getKicks
      tags: [kicks]
      summary: List kicks with optional filters
      parameters:
        - name: athleteId
          in: query
          required: false
          schema:
            type: string
        - name: kickType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/KickType"
        - name: gameId
          in: query
          required: false
          schema:
            type: string
        - name: practiceOnly
          in: query
          required: false
          schema:
            type: boolean
        - name: practiceSessionId
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of kicks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Kick"
    post:
      operationId: createKick
      tags: [kicks]
      summary: Record a new kick
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKickBody"
      responses:
        "201":
          description: Created kick
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kick"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kicks/{id}:
    delete:
      operationId: deleteKick
      tags: [kicks]
      summary: Delete a kick (fat-finger correction)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /kicks/stats/{athleteId}:
    get:
      operationId: getAthleteStats
      tags: [kicks]
      summary: Get kick statistics for an athlete
      parameters:
        - name: athleteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Athlete stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AthleteStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    KickType:
      type: string
      enum: [field_goal, punt, kickoff]

    Athlete:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - createdAt

    CreateAthleteBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    UpdateAthleteBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    Season:
      type: object
      properties:
        id:
          type: string
        athleteId:
          type: string
        name:
          type: string
        year:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - athleteId
        - name
        - year
        - createdAt

    CreateSeasonBody:
      type: object
      properties:
        athleteId:
          type: string
        name:
          type: string
        year:
          type: integer
      required:
        - athleteId
        - name
        - year

    UpdateSeasonBody:
      type: object
      properties:
        name:
          type: string
        year:
          type: integer

    GameWeather:
      type: object
      properties:
        conditions:
          type: string
          enum: [clear, cloudy, rain, snow, dome]
          nullable: true
        windMph:
          type: integer
          nullable: true
        windDir:
          type: string
          nullable: true

    Game:
      type: object
      properties:
        id:
          type: string
        seasonId:
          type: string
        athleteId:
          type: string
        opponent:
          type: string
          nullable: true
        date:
          type: string
        homeAway:
          type: string
          enum: [home, away]
        surface:
          type: string
          enum: [grass, turf]
        weather:
          $ref: "#/components/schemas/GameWeather"
          nullable: true
        isPlayoff:
          type: boolean
        myScore:
          type: integer
          nullable: true
        opponentScore:
          type: integer
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - seasonId
        - athleteId
        - date
        - homeAway
        - surface
        - isPlayoff
        - createdAt

    CreateGameBody:
      type: object
      properties:
        seasonId:
          type: string
        athleteId:
          type: string
        opponent:
          type: string
          nullable: true
        date:
          type: string
        homeAway:
          type: string
          enum: [home, away]
        surface:
          type: string
          enum: [grass, turf]
        weather:
          $ref: "#/components/schemas/GameWeather"
          nullable: true
        isPlayoff:
          type: boolean
      required:
        - seasonId
        - athleteId
        - date
        - homeAway
        - surface
        - isPlayoff

    UpdateGameBody:
      type: object
      properties:
        myScore:
          type: integer
          nullable: true
        opponentScore:
          type: integer
          nullable: true
        opponent:
          type: string
          nullable: true

    FieldGoalData:
      type: object
      properties:
        los:
          type: number
        totalDistance:
          type: number
        outcome:
          type: string
          enum: [made, missed]
        missType:
          type: string
          enum: [left, right, short, blocked, bad_snap]
          nullable: true
      required:
        - los
        - totalDistance
        - outcome

    PuntData:
      type: object
      properties:
        snapYard:
          type: number
        snapSide:
          type: string
          enum: [own, opponent]
        landingYard:
          type: number
          nullable: true
        landingSide:
          type: string
          enum: [own, opponent]
          nullable: true
        distance:
          type: number
          nullable: true
        hangtime:
          type: number
        result:
          type: string
          enum: [out_of_bounds, touchback, blocked, bad_snap, fair_catch, downed, punt_return]
          nullable: true
        returnYards:
          type: number
          nullable: true
      required:
        - snapYard
        - snapSide
        - hangtime

    KickoffData:
      type: object
      properties:
        touchback:
          type: boolean
        touchbackType:
          type: string
          enum: [endzone, out_of_endzone]
          nullable: true
        outOfBounds:
          type: boolean
          nullable: true
        hangtime:
          type: number
        landingYard:
          type: number
          nullable: true
        returnYards:
          type: number
          nullable: true
      required:
        - touchback
        - hangtime

    PracticeSession:
      type: object
      properties:
        id:
          type: string
        athleteId:
          type: string
        date:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - athleteId
        - date
        - createdAt

    CreatePracticeSessionBody:
      type: object
      properties:
        athleteId:
          type: string
        date:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - athleteId
        - date

    UpdatePracticeSessionBody:
      type: object
      properties:
        date:
          type: string
        notes:
          type: string
          nullable: true

    Kick:
      type: object
      properties:
        id:
          type: string
        athleteId:
          type: string
        gameId:
          type: string
          nullable: true
        practiceSessionId:
          type: string
          nullable: true
        kickType:
          $ref: "#/components/schemas/KickType"
        data:
          type: object
        isGameWinner:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - athleteId
        - kickType
        - data
        - isGameWinner
        - createdAt

    CreateKickBody:
      type: object
      properties:
        athleteId:
          type: string
        gameId:
          type: string
          nullable: true
        practiceSessionId:
          type: string
          nullable: true
        kickType:
          $ref: "#/components/schemas/KickType"
        data:
          type: object
        isGameWinner:
          type: boolean
      required:
        - athleteId
        - kickType
        - data

    AthleteStats:
      type: object
      properties:
        athleteId:
          type: string
        totalKicks:
          type: integer
        fieldGoals:
          type: object
          properties:
            total:
              type: integer
            made:
              type: integer
            missed:
              type: integer
        punts:
          type: object
          properties:
            total:
              type: integer
            avgDistance:
              type: number
            avgHangtime:
              type: number
        kickoffs:
          type: object
          properties:
            total:
              type: integer
            touchbacks:
              type: integer
            avgHangtime:
              type: number
      required:
        - athleteId
        - totalKicks
        - fieldGoals
        - punts
        - kickoffs
